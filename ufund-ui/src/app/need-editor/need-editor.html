<div class="editor-container">
    <h2>{{ app.isCreatingNeed() ? 'Create New' : 'Edit' }} Need</h2>

    <form (ngSubmit)="onSubmit()" #needForm="ngForm">

        <div class="form-group">
            <label for="name">Need Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="name" #nameInput="ngModel" required
                placeholder="e.g. Canned Fish" required>
        </div>

        <div class="form-group">
            <label for="type">Need Type</label>
            <input type="text" id="type" name="type" [(ngModel)]="type" #typeInput="ngModel" required
                placeholder="e.g. Food" required>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label for="description">Description</label>
                <button type="button" class="btn-ai" [disabled]="nameInput.invalid || typeInput.invalid || isGenerating"
                    (click)="generateAIDescription()">
                    <span class="sparkle">✨</span> {{ isGenerating ? "Harold is thinking..." : "Generate with Ask Harold" }}
                </button>
            </div>
            <textarea id="description" name="description" [(ngModel)]="desc" rows="3"
                placeholder="Describe the need..."></textarea>
        </div>

        <label>Icon</label>
        <div class="form-group icon-section">
            <div class="label-row">
                <div class="emoji-preview" [class.pulse]="isGenerating">
                    {{ icon || '∅' }}
                </div>

                <div class="icon-actions">
                    <button type="button" class="btn-ai" (click)="generateEmoji()"
                        [disabled]="nameInput.invalid || typeInput.invalid || isGenerating">
                        <span class="sparkle">✨</span> {{ isGenerating ? "..." : "Auto-Icon" }}
                    </button>

                    @if (icon) {
                    <button type="button" class="btn-remove-icon" (click)="removeIcon()">
                        Remove
                    </button>
                    }
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="cost">Price per Unit (USD)</label>
            <div class="input-with-symbol">
                <span class="currency-symbol">$</span>
                <input type="number" id="cost" name="cost" [(ngModel)]="cost" min="0.01" step="0.01" required>
            </div>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity Needed</label>
            <input type="number" id="quantity" name="quantity" [(ngModel)]="quantity" min="1" step="1" required>
        </div>

        <div class="button-group">
            <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
            <button type="submit" class="btn-submit" [disabled]="!needForm.form.valid">
                {{ app.isCreatingNeed() ? 'Create' : 'Save Changes' }}
            </button>
        </div>

    </form>
</div>
