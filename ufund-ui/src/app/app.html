<div class="container app">
  <div class="container toolbar">
    <nav class="navbar navbar-light">
      <div class="container-fluid">
        <a class="navbar-brand" routerLink="/home" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
          <img (click)="home()" src="ylc_bitmap.png" alt="Logo" width="40" height="40">
          <span (click)="home()" style="font-weight: bold; color: #333; font-size: 1.7rem;">YourLocalCupboard</span>
        </a>

        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" (click)="worldMap()" [hidden]="false">World Needs Map</a>
            <a class="nav-link" (click)="checkout()" [hidden]="!loggedIn() || isManager()">Review Basket</a>
            <a class="nav-link active" routerLinkActive="active" routerLink="/login" [hidden]="loggedIn()">Login</a>
            <a class="nav-link" (click)="logout()" [hidden]="!loggedIn()">Logout</a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
  <div class="container main-body">
    <router-outlet></router-outlet>
    <app-global-modal></app-global-modal>
  </div>
</div>
