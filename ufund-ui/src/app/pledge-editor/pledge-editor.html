<div class="pledge-container">
    <h2>Funding {{ name }}</h2>

    <form (ngSubmit)="onSubmit()" #pledgeForm="ngForm">
        <div class="form-group">
            <label for="money">Money Pledging (USD)</label>
            <div class="input-with-symbol">
                <span class="currency-symbol">$</span>
                <input type="number" id="money" name="money" [(ngModel)]="money" min="0.00" step="0.01" required>
            </div>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity Pledging</label>
            <input type="number" id="quantity" name="quantity" [(ngModel)]="quantity" min="0" step="1" required>
        </div>

        <div class="button-group">
            <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
            <button type="submit" class="btn-submit" [disabled]="!pledgeForm.form.valid">Add to Basket</button>
        </div>

        <p>The pledge will not be made official until checkout.</p>
    </form>
</div>
